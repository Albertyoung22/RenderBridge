services:
  - type: web
    name: render-bridge-server
    env: python
    buildCommand: pip install -r server/requirements.txt
    startCommand: uvicorn server.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TUNNEL_SECRET_TOKEN
        generateValue: true # Render will generate a random secret for you
      - key: PYTHON_VERSION
        value: 3.10.0
